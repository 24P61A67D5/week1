<!DOCTYPE html>
<html>
<head>
    <title>Registration Details</title>
</head>
<body>

<h2>Successfully Registration completed</h2>

<p><strong>Name:</strong> <span id="name"></span></p>
<p><strong>Phone:</strong> <span id="phone"></span></p>
<p><strong>Gender:</strong> <span id="gender"></span></p>
<p><strong>Department:</strong> <span id="department"></span></p>

<script>
    const params = new URLSearchParams(window.location.search);

    document.getElementById("name").textContent = params.get("name");
    document.getElementById("phone").textContent = params.get("phone");
    document.getElementById("gender").textContent = params.get("gender");
    document.getElementById("department").textContent = params.get("department");
</script>

</body>
</html>
